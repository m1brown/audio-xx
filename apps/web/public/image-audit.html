function upd(){document.getElementById('summary').innerHTML='<span class="pass-text">✅ '+pc+' passed</span> · <span class="fail-text">❌ '+fc+' failed</span> · <span class="pending-text">'+pn+' pending</span>';}
upd();
var g=document.getElementById('grid');
E.forEach(function(e,i){
var c=document.createElement('div');c.className='card';c.id='c'+i;
c.innerHTML='<div class="key">'+e.key+'</div><div class="status" id="s'+i+'">⏳</div><div class="ph" id="p'+i+'">Loading…</div><div class="url">'+e.url.slice(0,90)+'</div>';
g.appendChild(c);
var img=new Image();img.referrerPolicy='no-referrer';
img.style.cssText='max-width:100%;max-height:150px;object-fit:contain;display:block;margin:.5rem auto';
img.onload=function(){c.className='card pass';document.getElementById('s'+i).innerHTML='✅ '+img.naturalWidth+'×'+img.naturalHeight;document.getElementById('p'+i).replaceWith(img);pc++;pn--;R.push({key:e.key,url:e.url,ok:true});upd();};
img.onerror=function(){c.className='card fail';document.getElementById('s'+i).innerHTML='❌ Failed';document.getElementById('p'+i).textContent='FAILED';document.getElementById('p'+i).style.color='#c33';fc++;pn--;R.push({key:e.key,url:e.url,ok:false});upd();};
setTimeout(function(){img.src=e.url;},i*30);
});
function copyFailures(){var f=R.filter(function(r){return !r.ok;});navigator.clipboard.writeText(f.map(function(x){return x.key+'\t'+x.url;}).join('\n')).then(function(){alert('Copied '+f.length+' failures');});}
