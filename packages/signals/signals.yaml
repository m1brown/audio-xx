      - sterile
      - forward
      - antiseptic
      - soulless
      - sounds fake
      - sounds artificial
      - sounds synthetic
      - sounds processed
      - no soul
      - lacks soul
      - too perfect
      - surgically clean
    signals:
      fatigue_risk: up
      sweetness: down
      flow: down
    symptom: clinical_sterile

  # ── Warmth / Richness ──────────────────────────────

  - phrases:
