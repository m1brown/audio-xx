# Audio XX — Signal Dictionary
# Maps common listener phrases to trait signals and archetype hints.
# This is the bridge between free-text input and the rule engine.
# Edit this file to add phrases — no code changes required.
#
# ── v1 Axis Model ──────────────────────────────────────
# Primary axes: Warm↔Bright, Smooth↔Detailed, Elastic↔Controlled, Scale↔Intimacy
# Overlay: Relaxed↔Fatiguing
#
# Each signal entry maps user language to secondary trait signals.
# The engine infers primary axis positions from these signals.
# See: docs/audio_xx_sonic_trait_framework_v1.md

signals:
  # ── Brightness / Harshness ──────────────────────────
  # Axis: Bright side of Warm ↔ Bright + Fatiguing overlay

  - phrases:
      - bright
      - brightness
      - harsh
      - sibilant
      - piercing
      - edgy
      - sharp
      - spitty
      - aggressive treble
      - aggressive
      - etched
      - hard
      - metallic
      - too metallic
      - tinny
      - shrill
      - shrieky
      - ear piercing
      - s sounds are harsh
      - too much treble
      - too much high end
      - highs are too much
      # "how much X" pattern
      - how much treble
      - so much treble
      - how bright
      - how harsh
      # simile / metaphor
      - sounds like a tin can
      - tin can sound
      - sounds like a phone speaker
      - sounds like a cheap radio
      # instrument-specific
      - cymbals are painful
      - cymbals hurt
      - guitar sounds harsh
      - piano sounds tinny
      - vocals sound harsh
      # negated positive
      - no smoothness
      - no sweetness
    signals:
      fatigue_risk: up
      glare_risk: up
    symptom: brightness_harshness

  # ── Glare (distinct from general brightness) ────────
  # Axis: Bright (extreme) + Fatiguing overlay

  - phrases:
      - glare
      - glary
      - too much glare
      - upper midrange glare
    signals:
      glare_risk: up
      fatigue_risk: up
    symptom: glare

  # ── Clinical / Sterile ──────────────────────────────
  # Axis: Bright + Detailed + Controlled intersection

  - phrases:
