# Audio XX — Signal Dictionary
# Maps common listener phrases to trait signals and archetype hints.
# This is the bridge between free-text input and the rule engine.
# Edit this file to add phrases — no code changes required.
#
# ── v1 Axis Model ──────────────────────────────────────
# Primary axes: Warm↔Bright, Smooth↔Detailed, Elastic↔Controlled, Scale↔Intimacy
# Overlay: Relaxed↔Fatiguing
#
# Each signal entry maps user language to secondary trait signals.
# The engine infers primary axis positions from these signals.
# See: docs/audio_xx_sonic_trait_framework_v1.md

signals:
  # ── Brightness / Harshness ──────────────────────────
  # Axis: Bright side of Warm ↔ Bright + Fatiguing overlay

  - phrases:
      - bright
      - brightness
      - harsh
      - sibilant
      - piercing
      - edgy
      - sharp
      - spitty
      - aggressive treble
      - aggressive
      - etched
      - hard
    signals:
      fatigue_risk: up
      glare_risk: up
    symptom: brightness_harshness

  # ── Glare (distinct from general brightness) ────────
  # Axis: Bright (extreme) + Fatiguing overlay

  - phrases:
      - glare
      - glary
      - too much glare
      - upper midrange glare
    signals:
      glare_risk: up
      fatigue_risk: up
    symptom: glare

  # ── Clinical / Sterile ──────────────────────────────
  # Axis: Bright + Detailed + Controlled intersection

  - phrases:
      - clinical
      - sterile
      - forward
      - antiseptic
      - soulless
    signals:
      fatigue_risk: up
      sweetness: down
      flow: down
    symptom: clinical_sterile

  # ── Warmth / Richness ──────────────────────────────

  - phrases:
      - warm
      - warmth
      - rich
      - lush
      - full-bodied
      - round
      - creamy
      - golden
      - dense
      - full
      - fuller
      - body
      - bodied
      - weight
      - weighted
      - saturated
    signals:
      tonal_density: up
      fatigue_risk: down
    symptom: warmth_richness

  # ── Sweetness / Flow / Harmonic Preference ─────────
  # Axis: Warm × Smooth intersection

  - phrases:
      - sweet
      - sweetness
      - glow
      - glowing
      - silky
      - harmonic
      - harmonically rich
      - natural decay
      - tube-like
      - forgiving
    signals:
      sweetness: up
      flow: up
      fatigue_risk: down
    symptom: sweetness_flow

  # ── Musical / Organic / Flowing ─────────────────────
  # Axis: Smooth side of Smooth ↔ Detailed + Elastic

  - phrases:
      - flow
      - flowing
      - musical
      - breathes
      - organic
      - natural
      - liquid
      - ease
      - easier
      - coherent
      - continuous
    signals:
      flow: up
      tonal_density: up
      elasticity: up
      fatigue_risk: down
    symptom: musical_organic
    archetype_hint: engagement

  # ── Thinness ──────────────────────────────────────

  - phrases:
      - thin
      - lean
      - lightweight
      - anemic
      - no body
      - lacks weight
      - skeletal
    signals:
      tonal_density: down
      bass_weight: down
    symptom: thinness

  # ── Flat / Lifeless ────────────────────────────────

  - phrases:
      - flat
      - lifeless
      - boring
      - dead
      - no energy
      - dull
      - unengaging
      - uninvolving
      - dry
    signals:
      flow: down
      tonal_density: down
      dynamics: down
      elasticity: down
    symptom: flat_lifeless

  # ── Congestion / Muddiness ────────────────────────

  - phrases:
      - congested
      - muddy
      - thick
      - cloudy
      - smeared
      - veiled
    signals:
      clarity: down
      damping_control: down
    symptom: congestion_muddiness

  # ── Fatigue / Tiring ──────────────────────────────

  - phrases:
      - fatiguing
      - fatigue
      - tiring
      - exhausting
      - can't listen long
      - need a break
      - wearing
      - grating
    signals:
      fatigue_risk: up
    symptom: fatigue

  # ── Detail / Revealing ────────────────────────────
  # Axis: Detailed side of Smooth ↔ Detailed

  - phrases:
      - detailed
      - detail
      - revealing
      - resolving
      - resolution
      - transparent
      - high resolution
      - insightful
      - analytical
      - clear
      - clarity
      - explicit
    signals:
      clarity: up
    symptom: detail_revealing

  # ── Scale / Open / Spacious ────────────────────────
  # Axis: Scale side of Scale ↔ Intimacy

  - phrases:
      - airy
      - open
      - spacious
      - expansive
      - boundless
      - room-filling
      - holographic
    signals:
      openness: up
      soundstage: up
    symptom: airy_open

  # ── Intimacy / Boxy / Intimate ─────────────────────
  # Axis: Intimacy side of Scale ↔ Intimacy

  - phrases:
      - closed
      - closed-in
      - boxy
      - claustrophobic
      - small sounding
      - boxed in
      - intimate
    signals:
      openness: down
      soundstage: down
    symptom: closed_boxy

  # ── Smooth / Relaxed ──────────────────────────────

  - phrases:
      - smooth
      - relaxed
      - easy
      - gentle
      - laid back
      - effortless
      - non-fatiguing
    signals:
      flow: up
      composure: up
    symptom: smooth_relaxed

  # ── Dynamic / Punchy ──────────────────────────────

  - phrases:
      - dynamic
      - punchy
      - impactful
      - explosive
      - transient
    signals:
      dynamics: up
      elasticity: up
    symptom: dynamic_punchy

  # ── Speed / Transient Attack ─────────────────────

  - phrases:
      - speed
      - fast
      - faster
      - quick
      - quickness
      - attack
      - attacking
      - transients
      - transient attack
      - snappy
      - tight timing
      - tight
      - rhythmic drive
      - drive
      - pace
      - prat
      - timing
      - leading edge
    signals:
      dynamics: up
      elasticity: up
    symptom: speed_transient_attack
    archetype_hint: engagement

  # ── Exciting / Engaging / Alive ──────────────────────
  # Axis: Elastic side of Elastic ↔ Controlled

  - phrases:
      - exciting
      - alive
      - lively
      - engaging
      - toe-tapping
      - visceral
      - elastic
      - elasticity
    signals:
      dynamics: up
      elasticity: up
    symptom: exciting_engaging
    archetype_hint: engagement

  # ── Controlled / Damped / Precise ──────────────────
  # Axis: Controlled side of Elastic ↔ Controlled

  - phrases:
      - controlled
      - precise
      - iron grip
      - vice-like
      - authoritative
      - composed
      - unflappable
    signals:
      composure: up
      damping_control: up
    symptom: controlled_precise

  # ── Overdamped / Lifeless Control ──────────────────
  # Axis: Controlled (extreme) on Elastic ↔ Controlled

  - phrases:
      - overdamped
      - too controlled
      - too tight
      - strangled
      - suffocated
      - no life
      - mechanical
    signals:
      elasticity: down
      dynamics: down
      composure: up
    symptom: overdamped

  # ── Too Polite / Sleepy (Engagement hint) ─────────

  - phrases:
      - too polite
      - sleepy
      - too safe
      - boring but good
      - technically fine but
      - lacks excitement
      - no toe tapping
      - doesn't grab me
    signals:
      elasticity: down
      dynamics: down
    symptom: too_polite
    archetype_hint: engagement

  # ── Can't Relax / Too Forward (Composure hint) ───

  - phrases:
      - can't relax
      - too forward
      - in your face
      - too intense
      - stressful
      - too much energy
      - overwhelming
    signals:
      composure: down
      fatigue_risk: up
    symptom: too_forward
    archetype_hint: composure

  # ── Low Volume Listening (Low-volume hint) ────────

  - phrases:
      - listen quietly
      - apartment
      - at night
      - low volume
      - quiet listening
      - neighbours
      - late night
      - low level
    signals: {}
    symptom: low_volume_context
    archetype_hint: low_volume

  # ── Thin at Low Volume ────────────────────────────

  - phrases:
      - sounds thin unless I turn it up
      - only sounds good loud
      - needs volume to open up
      - thin at low volume
      - loses bass when quiet
    signals:
      low_volume_integrity: down
    symptom: thin_at_low_volume
    archetype_hint: low_volume

  # ── Regression Markers ────────────────────────────

  - phrases:
      - lost something
      - worse than before
      - used to be better
      - miss what I had
      - step backwards
      - regression
      - downgrade
    signals:
      flow: down
    symptom: regression

  # ── Improvement Markers ───────────────────────────

  - phrases:
      - better
      - improved
      - step up
      - upgrade
      - night and day
      - much better
      - significant improvement
    signals:
      flow: up
    symptom: improvement

  # ── Narrow Soundstage ─────────────────────────────

  - phrases:
      - narrow soundstage
      - no width
      - bunched together
      - no separation
      - everything in the middle
      - collapsed
    signals:
      soundstage: down
    symptom: narrow_soundstage

  # ── Bass Bloom ────────────────────────────────────

  - phrases:
      - bass bloom
      - bloated
      - boomy
      - one-note bass
      - bass overhang
      - room boom
      - resonant bass
    signals:
      damping_control: down
      bass_weight: up
    symptom: bass_bloom

# ── Uncertainty Markers ───────────────────────────
# These are not signal entries — they are tracked separately.
# The signal processor counts occurrences to set uncertainty_level (0–3).

uncertainty_markers:
  - maybe
  - not sure
  - I think
  - slightly
  - sort of
  - kind of
  - perhaps
  - possibly
  - might be
  - hard to tell
  - could be
